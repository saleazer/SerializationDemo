name: Sitecore Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
    secrets:
      XMC_CLIENT_ID:
        required: true
      XMC_CLIENT_SECRET:
        required: true
      XMC_AUTH_HOST:
        required: true
      XMC_CM_HOST:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Itempackage Artifact
        uses: actions/download-artifact@v4
        with:
          name: foundation.itempackage

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Sitecore CLI
        run: dotnet tool install Sitecore.Cli

      - name: Initialize Sitecore CLI Plugins
        run: dotnet sitecore plugin init

      - name: Debug Sitecore credentials
        env:
          AUTH_HOST: ${{ secrets.XMC_AUTH_HOST }}
          CM_HOST: ${{ secrets.XMC_CM_HOST }}
          CLIENT_ID: ${{ secrets.XMC_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.XMC_CLIENT_SECRET }}
        run: |
          echo "AUTH_HOST is set: ${{ secrets.XMC_AUTH_HOST != '' }}"
          echo "CM_HOST is set: ${{ secrets.XMC_CM_HOST != '' }}"
          echo "CLIENT_ID is set: ${{ secrets.XMC_CLIENT_ID != '' }}"
          echo "CLIENT_SECRET is set: ${{ secrets.XMC_CLIENT_SECRET != '' }}"
          echo "AUTH_HOST value: ${AUTH_HOST}"
          echo "CM_HOST value: ${CM_HOST}"

      - name: Authenticate with Sitecore Cloud
        env:
          CLIENT_ID: ${{ secrets.XMC_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.XMC_CLIENT_SECRET }}
          AUTH_HOST: ${{ secrets.XMC_AUTH_HOST }}
          CM_HOST: ${{ secrets.XMC_CM_HOST }}
        run: |
          dotnet sitecore login \
            --authority "${AUTH_HOST}" \
            --audience "https://api.sitecorecloud.io" \
            --client-id "${CLIENT_ID}" \
            --client-secret "${CLIENT_SECRET}" \
            --cm "${CM_HOST}" \
            --client-credentials true \
            --allow-write true

      # - name: Deploy Itempackage to ${{ inputs.environment }}
      #   run: |
      #     echo "Deploying itempackage to ${{ inputs.environment }}"
      #     dotnet sitecore ser pkg install \
      #       -f foundation.itempackage
