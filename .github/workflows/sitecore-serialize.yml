name: Sitecore Serialization

on:
  push:
    branches: [ "releases/*" ]
  workflow_dispatch:

jobs:
  checkChanges:
    runs-on: ubuntu-latest
    outputs:
      serialization_changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check for serialization changes since last release
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine current release branch from GITHUB_REF.
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Current branch: $CURRENT_BRANCH"

          # If GITHUB_TOKEN is available, configure auth on the remote so
          # fetch works for private repos. Needed for ACT-CLI where
          # actions/checkout doesn't always set this up.
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            REPO_URL=$(git remote get-url origin 2>/dev/null || echo "")
            REPO_SLUG=$(echo "$REPO_URL" | sed -E 's|.*github\.com[:/]||; s|\.git$||')
            if [ -n "$REPO_SLUG" ]; then
              git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO_SLUG}.git"
            fi
          fi

          # Shallow-fetch all releases/* branch tips so we can list and diff them.
          git fetch --depth 1 --prune origin '+refs/heads/releases/*:refs/remotes/origin/releases/*' || true

          # Helper: extract the YYYYMMDD date from a releases/ branch name.
          extract_date() {
            echo "$1" | sed -n 's|.*releases/\([0-9]\{8\}\).*|\1|p'
          }

          # Extract date from current branch
          CURRENT_DATE=$(extract_date "$CURRENT_BRANCH")
          if [ -z "$CURRENT_DATE" ]; then
            echo "::error::Could not parse date from branch '$CURRENT_BRANCH'"
            exit 1
          fi

          # Find the most recent releases/* branch whose date is before ours.
          PREV_REF=""
          for REF in $(git for-each-ref --sort=refname --format='%(refname:short)' refs/remotes/origin/releases/); do
            DATE=$(extract_date "$REF")
            [ -z "$DATE" ] && continue
            [ "$DATE" -lt "$CURRENT_DATE" ] 2>/dev/null && PREV_REF="$REF"
          done

          if [ -z "$PREV_REF" ]; then
            echo "No previous release branch found — first release."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Previous release: $PREV_REF"

          # Compare src/Serialization between the two release branch tips.
          if ! git diff --quiet "$PREV_REF" "origin/$CURRENT_BRANCH" -- src/Serialization; then
            echo "Serialization changes detected."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No serialization changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

